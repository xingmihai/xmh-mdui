<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>星觅海的博客</title>
  <meta name="description" content="星觅海的个人博客，分享技术文章和生活随笔">
  <meta name="theme-color" content="#0061a4">
  <meta property="og:title" content="星觅海的博客">
  <meta property="og:description" content="星觅海的个人博客，分享技术文章和生活随笔">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mdui.xmhai.cn">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/mdui@2.1.3/mdui.css">
  <script src="https://unpkg.com/mdui@2.1.3/mdui.global.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@waline/client@3.3.0/dist/waline.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.css">
  <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const html = document.documentElement;
      html.classList.remove('mdui-theme-light', 'mdui-theme-dark', 'mdui-theme-auto');
      if (saved === 'dark') html.classList.add('mdui-theme-dark');
      else if (saved === 'light') html.classList.add('mdui-theme-light');
      else html.classList.add('mdui-theme-auto');
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plantuml-encoder@1.4.0/dist/plantuml-encoder.min.js"></script>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- 阅读进度条 -->
  <div class="reading-progress" id="reading-progress">
    <div class="reading-progress-bar" id="reading-progress-bar"></div>
  </div>

  <mdui-top-app-bar class="top-app-bar">
    <mdui-button-icon id="menu-btn">
      <mdui-icon name="menu"></mdui-icon>
    </mdui-button-icon>
    <mdui-top-app-bar-title>星觅海的博客</mdui-top-app-bar-title>
    <mdui-button-icon id="toc-toggle-btn" title="目录" style="display:none;">
      <mdui-icon name="toc"></mdui-icon>
    </mdui-button-icon>
  </mdui-top-app-bar>

  <mdui-card class="sidebar" id="sidebar" variant="elevated">
    <div class="sidebar-inner">
      <div class="site-brand">
        <mdui-avatar src="https://q1.qlogo.cn/g?b=qq&nk=1498934815&s=100" alt="avatar" class="site-avatar"></mdui-avatar>
        <div class="sidebar-text site-meta">
          <div class="mdui-typescale-title-medium site-name">星觅海</div>
          <div class="mdui-typescale-body-small site-desc">一起慢慢进步</div>
        </div>
      </div>
      <div class="search-wrap sidebar-text">
        <mdui-text-field id="search-input" variant="outlined" placeholder="搜索文章..." icon="search" helper="输入关键词实时搜索" class="search-field"></mdui-text-field>
        <div class="search-dropdown" id="search-dropdown">
          <div id="search-results"></div>
        </div>
      </div>
      <mdui-divider class="nav-divider"></mdui-divider>
      <mdui-list class="nav-list">
        <mdui-list-item rounded href="#/" id="nav-home">
          <mdui-icon name="home" slot="icon"></mdui-icon>
          <div class="sidebar-text">首页</div>
        </mdui-list-item>
        <mdui-list-item rounded href="#/archive" id="nav-archive">
          <mdui-icon name="archive" slot="icon"></mdui-icon>
          <div class="sidebar-text">归档</div>
        </mdui-list-item>
        <mdui-list-item rounded href="#/about" id="nav-about">
          <mdui-icon name="person" slot="icon"></mdui-icon>
          <div class="sidebar-text">关于</div>
        </mdui-list-item>
        <mdui-list-item rounded href="#/friends" id="nav-friends">
          <mdui-icon name="group" slot="icon"></mdui-icon>
          <div class="sidebar-text">朋友</div>
        </mdui-list-item>
      </mdui-list>
      <mdui-divider class="nav-divider"></mdui-divider>
      <div class="theme-wrap">
        <mdui-button-icon id="theme-light" title="亮色模式">
          <mdui-icon name="brightness_7"></mdui-icon>
        </mdui-button-icon>
        <mdui-button-icon id="theme-dark" title="暗色模式">
          <mdui-icon name="brightness_2"></mdui-icon>
        </mdui-button-icon>
        <mdui-button-icon id="theme-auto" title="跟随系统">
          <mdui-icon name="brightness_auto"></mdui-icon>
        </mdui-button-icon>
      </div>
    </div>
  </mdui-card>

  <!-- 文章目录侧边栏 -->
  <mdui-card class="toc-sidebar" id="toc-sidebar" variant="elevated">
    <div class="toc-header">
      <span class="mdui-typescale-title-small">目录</span>
      <mdui-button-icon id="toc-close-btn">
        <mdui-icon name="close"></mdui-icon>
      </mdui-button-icon>
    </div>
    <mdui-divider></mdui-divider>
    <div class="toc-content" id="toc-content"></div>
  </mdui-card>

  <div class="main-content" id="main-content">
    <div class="app-bar-spacer"></div>
    <div id="page-container" class="page-transition"></div>
    <footer class="footer">
      <div class="footer-rss">
        <a href="/rss.xml" class="footer-link">
          <mdui-icon name="rss_feed"></mdui-icon>
          <span>RSS 订阅</span>
        </a>
      </div>
      <div class="mdui-typescale-body-small footer-copy">
        © <span id="year"></span> 星觅海 · <span id="pageviews">加载中...</span> · Powered by MDUI & Cloudflare
      </div>
      <div class="mdui-typescale-body-small footer-icp"></div>
    </footer>
  </div>

  <script type="module">
    import { init } from 'https://unpkg.com/@waline/client@3.3.0/dist/waline.js';
    window.WalineInit = init;
  </script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
