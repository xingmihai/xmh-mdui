<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="250" height="250" rx="10" fill="rgba(200, 200, 210, 0.45)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="5" y="5" width="240" height="240" rx="8" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1"/>

  <!-- 标题 -->
  <text x="125" y="32" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">
    十年之约
  </text>
  <text x="125" y="50" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="9" fill="#5a6c7d">
    2026.06.14 — 2036.06.14
  </text>

  <!-- 圆形进度条 -->
  <g transform="translate(125, 122)">
    <circle cx="0" cy="0" r="58" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="10"/>
    <circle id="progressCircle" cx="0" cy="0" r="58" fill="none" stroke="url(#progressGrad)" 
            stroke-width="10" stroke-linecap="round"
            stroke-dasharray="0 364.42" transform="rotate(-90)"/>

    <text id="progressText" x="0" y="-2" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="15" font-weight="bold" fill="#2c3e50">
      0.00%
    </text>
    <text x="0" y="12" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#5a6c7d">
      已完成
    </text>
  </g>

  <!-- 底部统计 -->
  <g transform="translate(0, 196)">
    <text x="62" y="0" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#5a6c7d">已过去</text>
    <text id="daysElapsed" x="62" y="20" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="17" font-weight="bold" fill="#c0392b">0</text>
    <text x="62" y="34" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#5a6c7d">天</text>

    <line x1="125" y1="4" x2="125" y2="32" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1"/>

    <text x="188" y="0" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#5a6c7d">剩余</text>
    <text id="daysRemaining" x="188" y="20" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="17" font-weight="bold" fill="#27ae60">3653</text>
    <text x="188" y="34" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#5a6c7d">天</text>
  </g>

  <!-- 当前时间 -->
  <text id="currentTime" x="125" y="242" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="8" fill="#7f8c8d">
    加载中...
  </text>

  <script type="text/javascript">
    <![CDATA[
    function updateProgress() {
      var startDate = new Date("2026-06-14T00:00:00+08:00");
      var endDate = new Date("2036-06-14T00:00:00+08:00");
      var now = new Date();

      var totalMs = endDate - startDate;
      var elapsedMs = now - startDate;
      var remainingMs = endDate - now;

      var progress = Math.max(0, Math.min(100, (elapsedMs / totalMs) * 100));
      var daysElapsed = Math.floor(elapsedMs / (1000 * 60 * 60 * 24));
      var daysRemaining = Math.max(0, Math.floor(remainingMs / (1000 * 60 * 60 * 24)));

      var circumference = 2 * Math.PI * 58;
      var dashOffset = circumference * (progress / 100);

      document.getElementById("progressCircle").setAttribute("stroke-dasharray", dashOffset + " " + circumference);
      document.getElementById("progressText").textContent = progress.toFixed(4) + "%";
      document.getElementById("daysElapsed").textContent = daysElapsed;
      document.getElementById("daysRemaining").textContent = daysRemaining;

      var timeStr = now.getFullYear() + "-" + 
        String(now.getMonth() + 1).padStart(2, "0") + "-" + 
        String(now.getDate()).padStart(2, "0") + " " + 
        String(now.getHours()).padStart(2, "0") + ":" + 
        String(now.getMinutes()).padStart(2, "0") + ":" + 
        String(now.getSeconds()).padStart(2, "0");
      document.getElementById("currentTime").textContent = timeStr;
    }

    updateProgress();
    setInterval(updateProgress, 1000);
    ]]>
  </script>
</svg>