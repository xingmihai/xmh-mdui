name: Build and Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'posts/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r posts-html _site/ 2>/dev/null || true
          cp search.json _site/
          cp rss.xml _site/
          cp sitemap.xml _site/
          cp index.html _site/ 2>/dev/null || true
          cp -r public/* _site/ 2>/dev/null || true

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
