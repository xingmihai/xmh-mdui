name: Build and Push

on:
  push:
    branches: [main, master]
    paths:
      - 'posts/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r posts-html _site/ 2>/dev/null || true
          cp search.json _site/
          cp rss.xml _site/
          cp sitemap.xml _site/
          cp index.html _site/ 2>/dev/null || true
          cp -r public/* _site/ 2>/dev/null || true

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
